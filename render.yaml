services:
  - type: web
    name: atividade-microservice-api-escolar
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_DEBUG
        value: "false"
      - key: CORS_ALLOW_ORIGIN
        value: https://front-gestao-escolar.onrender.com
      - key: SQLITE_DB_PATH
        value: banco_de_dados.db
      - key: SYNC_ON_STARTUP
        value: "false"
      - key: GESTAO_API_BASE_URL
        value: https://api-de-gerenciamento-escolar.onrender.com
      - key: RESERVA_API_BASE_URL
        value: https://api-de-reserva-de-salas.onrender.com
