name: Atividade CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Smoke test
        env:
          SQLITE_DB_PATH: /tmp/atividade-ci.db
          GESTAO_API_BASE_URL: http://127.0.0.1:5999
          SYNC_ON_STARTUP: "false"
        run: |
          python - <<'PY'
          from app import app
          client = app.test_client()
          for path in ['/atividades', '/docs', '/swagger.json']:
              resp = client.get(path)
              assert resp.status_code == 200, (path, resp.status_code, resp.get_data(as_text=True))
          resp = client.delete('/atividades/999999')
          assert resp.status_code == 404
          PY
